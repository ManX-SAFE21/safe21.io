<!--
  SAFE21 — logo (primary, for DARK backgrounds). Palette: Cyber Teal.
  Tile + transparent keyhole, off-white "SAFE", teal "21".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="SAFE21">
  <defs>
    <mask id="keyhole">
      <rect width="34" height="34" rx="8" fill="#fff"/>
      <circle cx="17" cy="14" r="5" fill="#000"/>
      <path d="M14 17 L20 17 L22 27 L12 27 Z" fill="#000"/>
    </mask>
  </defs>
  <g transform="translate(14,30)"><rect width="34" height="34" rx="8" fill="#0D9488" mask="url(#keyhole)"/></g>
  <text x="62" y="60" font-family="'Space Grotesk','Segoe UI',Arial,sans-serif" font-size="40" font-weight="600" letter-spacing="4">
    <tspan fill="#F5F7FA">SAFE</tspan><tspan fill="#2DD4BF">21</tspan>
  </text>
</svg>
